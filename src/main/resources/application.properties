spring.application.name=sentinel-india
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:localhost}}:${MYSQLPORT:${MYSQL_PORT:3306}}/${MYSQLDATABASE:${MYSQL_DATABASE:sentinel_india}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${DATABASE_USERNAME:${DB_USER:${MYSQLUSER:${MYSQL_USER:sentinel}}}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASS:${MYSQLPASSWORD:${MYSQL_PASSWORD:sentinel123}}}}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}

bhuvan.token=${BHUVAN_TOKEN:}
openaq.key=${OPENAQ_KEY:}
opensky.user=${OPENSKY_USER:}
opensky.pass=${OPENSKY_PASS:}
n2yo.key=${N2YO_KEY:}
aisstream.key=${AISSTREAM_KEY:}
railapi.key=${RAILAPI_KEY:}
datagovin.key=${DATAGOVIN_KEY:}
owm.key=${OWM_KEY:}
